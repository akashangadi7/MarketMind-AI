databases:
  - name: marketmind-db
    databaseName: marketmind
    user: marketmind_user
    plan: free

services:
  # --- FastAPI Backend (Docker) ---
  - type: web
    name: marketmind-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # Render will prompt you to enter this securely in the dashboard

  # --- React Frontend (Static Site) ---
  - type: web
    name: marketmind-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: marketmind-backend
          type: web
          property: host
