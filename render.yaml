databases:
  - name: marketmind-db
    databaseName: marketmind
    user: marketmind_user
    plan: free

services:
  # --- FastAPI Backend (serves frontend + API from one URL) ---
  - type: web
    name: marketmind-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # Enter this securely in the Render dashboard
